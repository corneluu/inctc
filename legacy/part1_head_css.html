<!DOCTYPE html>
<html lang="ro" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Prima intalnire nationala a corurilor de tineret catolic din Romania, cu Mons. Marco Frisina, la Filarmonica Banatul Timisoara." />
    <title>Intalnirea Nationala a Corurilor de Tineret Catolice | Timisoara 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
    Font strategy: display=swap keeps text visible instantly.
    Brave / Opera with strict shields will block Google Fonts –
    the @font-face metric-override block below ensures the system
    serif/sans fallback has nearly identical line-heights so layout
    does not shift when the custom fonts are unavailable.
    -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" />
    <script src="lang.js"></script>
    <style>
        /*
        * FONT METRIC OVERRIDES
        * When Brave / Opera blocks Google Fonts, these @font-face rules
        * make the system fallback fonts match Playfair/Inter dimensions
        * closely enough that no layout shift occurs.
        */
        @font-face {
            font-family: 'Playfair Display';
            src: local('Georgia'), local('Times New Roman');
            font-weight: 400 900;
            font-style: normal;
            size-adjust: 96%;
            ascent-override: 85%;
            descent-override: 22%;
            line-gap-override: 0%
        }

        @font-face {
            font-family: 'Cormorant Garamond';
            src: local('Palatino Linotype'), local('Palatino'), local('Georgia');
            font-weight: 300 600;
            font-style: normal;
            size-adjust: 94%;
            ascent-override: 83%;
            descent-override: 20%;
            line-gap-override: 0%
        }

        @font-face {
            font-family: 'Inter';
            src: local('Segoe UI'), local('-apple-system'), local('Helvetica Neue'), local('Arial');
            font-weight: 300 600;
            font-style: normal;
            size-adjust: 100%;
            ascent-override: 90%;
            descent-override: 22%;
            line-gap-override: 0%
        }

        :root {
            --blue: #0f172a;
            --blue-mid: #1e3a5f;
            --blue-lt: #2563eb;
            --gold: #d4af37;
            --gold-lt: #f0d060;
            --crimson: #7c1d1d;
            --crimson-lt: #b91c1c;
            --white: #faf9f6;
            --cream: #f5f5dc;
            --gray: #94a3b8;
            --dark: #091221;
            --glass: rgba(255, 255, 255, .07);
            --glass-b: rgba(255, 255, 255, .12);
            --sh-gold: 0 0 40px rgba(212, 175, 55, .25);
            --sh-deep: 0 20px 60px rgba(0, 0, 0, .5);
            --r: 1rem;
            --ease: cubic-bezier(.25, .46, .45, .94);
            --ff-h: 'Playfair Display', 'Georgia', serif;
            --ff-b: 'Inter', 'Segoe UI', sans-serif;
            --ff-a: 'Cormorant Garamond', serif
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px
        }

        body {
            font-family: var(--ff-b);
            background: var(--blue);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased
        }

        img {
            max-width: 100%;
            display: block
        }

        a {
            color: inherit;
            text-decoration: none
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font: inherit
        }

        ::selection {
            background: var(--gold);
            color: var(--blue)
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--dark)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px
        }

        /* SKIP + REVEAL */
        .skip-link {
            position: fixed;
            top: -100px;
            left: 1rem;
            z-index: 9999;
            background: var(--gold);
            color: var(--blue);
            padding: .5rem 1rem;
            border-radius: .5rem;
            font-weight: 600;
            transition: top .2s
        }

        .skip-link:focus {
            top: 1rem
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity .7s var(--ease), transform .7s var(--ease);
            will-change: opacity, transform
        }

        .reveal.visible {
            opacity: 1;
            transform: none
        }

        .r1 {
            transition-delay: .1s
        }

        .r2 {
            transition-delay: .2s
        }

        .r3 {
            transition-delay: .3s
        }

        .r4 {
            transition-delay: .4s
        }

        /* SECTION LABEL */
        .slabel {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem
        }

        .slabel::before {
            content: '';
            display: block;
            width: 2rem;
            height: 1px;
            background: var(--gold)
        }

        /* CONTAINER */
        .c {
            width: min(90%, 1200px);
            margin-inline: auto
        }

        /* NAVBAR */
        #nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: .75rem 0;
            /* Solid dark fallback for browsers that don't support backdrop-filter */
            background: rgba(9, 18, 33, .92);
            border-bottom: 1px solid var(--glass-b);
            transition: background .3s
        }

        /* Progressive enhancement: glassmorphism only where supported */
        @supports ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
            #nav {
                -webkit-backdrop-filter: blur(20px) saturate(1.5);
                backdrop-filter: blur(20px) saturate(1.5);
                background: rgba(9, 18, 33, .75)
            }
        }

        #nav.scrolled {
            background: rgba(9, 18, 33, .97)
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem
        }

        .nav-logo {
            font-family: var(--ff-a);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: .03em;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            list-style: none
        }

        .nav-links a {
            font-size: .82rem;
            font-weight: 500;
            letter-spacing: .04em;
            color: rgba(250, 249, 246, .75);
            transition: color .2s;
            position: relative
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 100%;
            height: 1px;
            background: var(--gold);
            transition: right .25s var(--ease)
        }

        .nav-links a:hover {
            color: var(--gold)
        }

        .nav-links a:hover::after {
            right: 0
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: .75rem
        }

        .lang-sw {
            display: flex;
            gap: .2rem
        }

        .lb {
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .08em;
            padding: .3rem .6rem;
            border-radius: 4px;
            color: var(--gray);
            border: 1px solid transparent;
            transition: all .2s;
            cursor: pointer;
            background: none
        }

        .lb.active,
        .lb:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, .08)
        }

        .nav-cta {
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .06em;
            padding: .5rem 1.1rem;
            border-radius: .4rem;
            background: var(--gold);
            color: var(--blue);
            transition: transform .2s, box-shadow .2s;
            display: inline-block
        }

        .nav-cta:hover {
            transform: scale(1.04);
            box-shadow: var(--sh-gold)
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 28px;
            cursor: pointer;
            padding: 4px
        }

        .hamburger span {
            display: block;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: transform .3s, opacity .3s
        }

        .hamburger.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg)
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0
        }

        .hamburger.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg)
        }

        .mob-menu {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(9, 18, 33, .97);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem
        }

        .mob-menu.open {
            display: flex
        }

        .mob-menu a {
            font-family: var(--ff-a);
            font-size: 2rem;
            color: var(--white);
            transition: color .2s
        }

        .mob-menu a:hover {
            color: var(--gold)
        }

        .mob-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2rem;
            color: var(--gray);
            cursor: pointer
        }

        /* HERO */
        #hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, #1e3a5f 0%, #0f172a 55%, #1a0a0a 100%);
            z-index: 0
        }

        .hero-rays {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: conic-gradient(from 0deg at 50% 40%, transparent 0deg, rgba(212, 175, 55, .04) 20deg, transparent 40deg, rgba(212, 175, 55, .03) 80deg, transparent 100deg, rgba(212, 175, 55, .04) 160deg, transparent 200deg);
            animation: rays 18s linear infinite;
            will-change: transform;
            transform: translate3d(0, 0, 0)
        }

        @keyframes rays {
            to {
                transform: rotate(360deg)
            }
        }

        .hero-notes {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
            transform: translate3d(0, 0, 0)
        }

        .note {
            position: absolute;
            font-size: 1.5rem;
            opacity: .07;
            color: var(--gold);
            animation: fnote 12s ease-in-out infinite
        }

        @keyframes fnote {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg)
            }

            50% {
                transform: translateY(-30px) rotate(5deg)
            }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            padding: 2rem 1.5rem
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, .4);
            padding: .4rem 1rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            background: rgba(212, 175, 55, .07);
            animation: fbadge 4s ease-in-out infinite
        }

        @keyframes fbadge {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-6px)
            }
        }

        .hero-badge::before {
            content: '✦';
            font-size: .6rem
        }

        .hero-title {
            font-family: var(--ff-h);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem
        }

        .hero-title .l1 {
            font-size: clamp(2.2rem, 6vw, 4.8rem);
            color: var(--white);
            display: block
        }

        .hero-title .l2 {
            font-size: clamp(2.4rem, 6.5vw, 5.2rem);
            color: var(--gold);
            font-style: italic;
            display: block
        }

        .hero-title .l3 {
            font-size: clamp(2rem, 5.5vw, 4.4rem);
            color: var(--white);
            display: block
        }

        .hero-sub {
            font-family: var(--ff-a);
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            font-weight: 300;
            color: rgba(250, 249, 246, .75);
            letter-spacing: .06em;
            margin-bottom: 3rem;
            font-style: italic
        }

        .hero-scroll {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .4rem;
            color: rgba(250, 249, 246, .4);
            font-size: .7rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            animation: bounce 2s ease-in-out infinite
        }

        .hero-scroll svg {
            width: 20px;
            height: 20px
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(8px)
            }
        }

        /* WORD REVEAL */
        .wr {
            display: inline-block;
            overflow: hidden;
            vertical-align: bottom
        }

        .wr span {
            display: inline-block;
            transform: translateY(110%);
            opacity: 0;
            animation: wu .7s var(--ease) forwards
        }

        @keyframes wu {
            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        /* ABOUT */
        #about {
            padding: 8rem 0;
            background: linear-gradient(180deg, var(--blue) 0%, #0d1f38 100%)
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center
        }

        .about-text h2 {
            font-family: var(--ff-h);
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 1.5rem
        }

        .about-text h2 em {
            color: var(--gold);
            font-style: italic
        }

        .about-text p {
            color: rgba(250, 249, 246, .8);
            margin-bottom: 1rem;
            font-size: .97rem
        }

        .about-text strong {
            color: var(--gold)
        }

        .pull-q {
            border-left: 3px solid var(--gold);
            margin: 2rem 0;
            padding: 1rem 1.5rem;
            background: rgba(212, 175, 55, .05);
            border-radius: 0 .5rem .5rem 0
        }

        .pull-q p {
            font-family: var(--ff-a);
            font-size: 1.2rem;
            font-style: italic;
            color: var(--cream);
            margin: 0
        }

        .about-visual {
            border-radius: 1.5rem;
            overflow: hidden
        }

        .vis-ph {
            aspect-ratio: 3/4;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 60%, #3d1010 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
            border: 1px solid var(--glass-b);
            position: relative;
            overflow: hidden
        }

        .vis-ph::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(212, 175, 55, .15) 0%, transparent 70%)
        }

        .vis-icon {
            font-size: 4.5rem;
            opacity: .5
        }

        .vis-lbl {
            font-family: var(--ff-a);
            font-size: 1rem;
            color: var(--gray);
            text-align: center;
            font-style: italic;
            position: relative;
            z-index: 1
        }

        /* GUEST */
        #guest {
            padding: 8rem 0;
            background: linear-gradient(180deg, #0d1f38 0%, var(--dark) 50%, #1a0505 100%);
            position: relative;
            overflow: hidden
        }

        #guest::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent)
        }

        .guest-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 5rem;
            align-items: start
        }

        .portrait-frame {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 3/4
        }

        .portrait-bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1e3a5f 0%, #0f172a 50%, #2d0505 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem
        }

        .p-init {
            font-family: var(--ff-h);
            font-size: 5rem;
            font-weight: 900;
            color: rgba(212, 175, 55, .3);
            line-height: 1
        }

        .p-name {
            font-family: var(--ff-a);
            font-size: 1rem;
            color: var(--gray);
            letter-spacing: .08em;
            font-style: italic;
            text-align: center;
            padding: 0 1rem
        }

        .p-ring {
            position: absolute;
            inset: -4px;
            border-radius: calc(1.5rem + 4px);
            border: 2px solid transparent;
            /* Overhaul: transform rotation is more stable than filter: hue-rotate
               We use a non-symmetric gradient so rotation is visible. */
            background: linear-gradient(var(--dark), var(--dark)) padding-box,
                linear-gradient(120deg, var(--gold), var(--crimson), #8b5cf6, var(--gold)) border-box;
            animation: ringSpin 10s linear infinite;
            will-change: transform;
            transform: translate3d(0, 0, 0)
        }

        @keyframes ringSpin {
            to {
                transform: rotate(360deg)
            }
        }

        .guest-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem
        }

        .scard {
            background: var(--glass);
            border: 1px solid var(--glass-b);
            border-radius: var(--r);
            padding: 1rem;
            text-align: center;
            /* Only transform — no layout/paint transition */
            transition: transform .2s
        }

        .scard:hover {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, .4)
        }

        .snum {
            font-family: var(--ff-h);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1
        }

        .slbl {
            font-size: .7rem;
            color: var(--gray);
            margin-top: .3rem;
            letter-spacing: .05em
        }

        .guest-info h2 {
            font-family: var(--ff-h);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            color: var(--white);
            margin-bottom: .3rem
        }

        .guest-role {
            font-size: .82rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2rem
        }

        .guest-bio p {
            color: rgba(250, 249, 246, .8);
            margin-bottom: 1rem;
            font-size: .97rem
        }

        .guest-bio strong {
            color: var(--gold)
        }

        .guest-bio em {
            color: var(--cream);
            font-style: italic
        }

        .gquote {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(212, 175, 55, .06);
            border: 1px solid rgba(212, 175, 55, .2);
            border-radius: var(--r);
            position: relative
        }

        .gquote::before {
            content: '"';
            font-family: var(--ff-h);
            font-size: 5rem;
            color: rgba(212, 175, 55, .2);
            position: absolute;
            top: -1rem;
            left: 1rem;
            line-height: 1
        }

        .gquote p {
            font-family: var(--ff-a);
            font-size: 1.15rem;
            font-style: italic;
            color: var(--cream);
            margin: 0
        }

        /* VENUE */
        #venue {
            padding: 8rem 0;
            background: linear-gradient(180deg, #1a0505 0%, var(--blue) 100%);
            position: relative;
            overflow: hidden
        }

        .venue-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center
        }

        .vbadge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-lt));
            color: var(--blue);
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .4rem .9rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            animation: pulse 2.5s ease-in-out infinite
        }

        .vbadge::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: rgba(255, 255, 255, .5);
            /* pure GPU: transform + opacity */
            animation: pulse 2.5s ease-in-out infinite;
            will-change: transform, opacity;
            pointer-events: none
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: .5
            }

            50% {
                transform: scale(1.35);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: .5
            }
        }

        .venue-info h2 {
            font-family: var(--ff-h);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: .5rem
        }

        .vcity {
            font-size: .85rem;
            color: var(--gold);
            letter-spacing: .1em;
            margin-bottom: 1.5rem
        }

        .venue-info p {
            color: rgba(250, 249, 246, .8);
            margin-bottom: 2rem;
            font-size: .97rem
        }

        .vfeats {
            display: flex;
            flex-direction: column;
            gap: .75rem
        }

        .vfeat {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .85rem 1.2rem;
            border-radius: .5rem;
            background: var(--glass);
            border: 1px solid var(--glass-b);
            transition: border-color .2s, transform .2s
        }

        .vfeat:hover {
            border-color: rgba(212, 175, 55, .5);
            transform: translateX(4px)
        }
